AWSTemplateFormatVersion: '2010-09-09'
Description: Zesty-Disk-POC

Parameters:
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the instances (recommended at least 2)

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for the instances

  ZestyApiKey:
    Type: String
    NoEcho: true
    Description: Your Zesty Infrastructure Agent API Key

  InstanceType:
    Type: String
    Default: c5a.large
    Description: EC2 instance type for the POC

  InstanceCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 5
    Description: Number of instances to launch

  RootVolumeSize:
    Type: Number
    Default: 8
    Description: Size of the Root volume (GB)

  MountDirectory:
    Type: String
    Default: /zd_directory
    Description: The directory path for the Zesty disk

  EnableEncryptionEBS:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable EBS encryption for both disks

  DeleteOnTerminationEBS:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Delete volumes when the instance is terminated

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ec2-tag-volumes
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                  - ec2:CreateTags
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  EC2LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "zesty-poc-template-${AWS::StackName}"
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
        IamInstanceProfile:
          Name: !Ref InstanceProfile
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        SecurityGroupIds:
          - !Ref SecurityGroupId
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: Zesty-Disk-POC
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail

            yum update -y
            yum install -y awscli

            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
            REGION=${AWS::Region}

            sleep 20

            # Tag Root Volume - Applying Name Tag explicitly
            ROOT_VOL=$(aws ec2 describe-volumes --region $REGION --filters Name=attachment.instance-id,Values=$INSTANCE_ID Name=attachment.device,Values=/dev/xvda --query "Volumes[0].VolumeId" --output text)
            aws ec2 create-tags --region $REGION --resources $ROOT_VOL --tags Key=Name,Value="ZD-POC-Root" Key=ManagedBy,Value="ZestyCFN"
            
            # Tag & Prepare Second Volume
            SECOND_VOL=$(aws ec2 describe-volumes --region $REGION --filters Name=attachment.instance-id,Values=$INSTANCE_ID Name=attachment.device,Values=/dev/xvdb --query "Volumes[0].VolumeId" --output text)
            
            if [ "$SECOND_VOL" != "None" ] && [ -n "$SECOND_VOL" ]; then
              aws ec2 create-tags --region $REGION --resources $SECOND_VOL --tags Key=Name,Value="ZD-POC-Data" Key=ZestyDisk,Value="true" Key=ManagedBy,Value="ZestyCFN"
              
              # Install Zesty Agent
              curl -s https://static.zesty.co/ZX-InfraStructure-Agent-release/install.sh | sudo bash -s apikey=${ZestyApiKey}
              
              # Mount Directory
              zestyctl disk mount /dev/xvdb ${MountDirectory} || true

              # Download data generator for POC testing
              curl "https://s3.eu-west-1.amazonaws.com/static.zesty.co/scripts/zesty-big-file-generator.sh" -o "/home/ec2-user/zesty-big-file-generator.sh"
              chmod +x /home/ec2-user/zesty-big-file-generator.sh
            fi

        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSize
              VolumeType: gp3
              Encrypted: !Ref EnableEncryptionEBS
              DeleteOnTermination: !Ref DeleteOnTerminationEBS
          - DeviceName: /dev/xvdb
            Ebs:
              VolumeSize: 30
              VolumeType: gp3
              Encrypted: !Ref EnableEncryptionEBS
              DeleteOnTermination: !Ref DeleteOnTerminationEBS

  EC2AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: !Ref InstanceCount
      MaxSize: !Ref InstanceCount
      DesiredCapacity: !Ref InstanceCount
      VPCZoneIdentifier: !Ref SubnetIds
      LaunchTemplate:
        LaunchTemplateId: !Ref EC2LaunchTemplate
        Version: !GetAtt EC2LaunchTemplate.LatestVersionNumber

Outputs:
  ASGName:
    Value: !Ref EC2AutoScalingGroup
  MountPoint:
    Value: !Ref MountDirectory
