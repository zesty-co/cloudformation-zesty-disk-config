AWSTemplateFormatVersion: '2010-09-09'
Description: Zesty-Disk-POC

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "1. AMI Selection"
        Parameters:
          - AmiSelection
          - CustomAMI
          - CustomOSType
      - Label:
          default: "2. Instance Configuration"
        Parameters:
          - ZestyApiKey
          - InstanceType
          - InstanceCount
          - KeyPairName
      - Label:
          default: "3. Storage Configuration"
        Parameters:
          - RootVolumeSize
          - RootVolumeType
          - ZestyVolumeSize
          - ZestyVolumeType
          - EncryptVolumes
          - DeleteVolumesOnTermination
      - Label:
          default: "4. Network Settings"
        Parameters:
          - SubnetIds
          - SecurityGroupId

Parameters:
  AmiSelection:
    Type: String
    Default: AmazonLinux2023
    AllowedValues: [AmazonLinux2023, Windows2022, CustomAMI]
    Description: Select a standard OS or 'Custom' to provide your own AMI ID.

  CustomAMI:
    Type: String
    Default: ""
    Description: "(Required ONLY if 'Custom' is selected) Enter your AMI ID."

  CustomOSType:
    Type: String
    Default: "Please-Select-OS-For-Custom"
    AllowedValues: ["Please-Select-OS-For-Custom", Linux, Windows]
    Description: "(Required ONLY if 'Custom' is selected) Specify if your custom AMI is Linux or Windows."

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the instances.

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for the instances.

  ZestyApiKey:
    Type: String
    NoEcho: true
    Description: Your Zesty Agent API Key.

  InstanceType:
    Type: String
    Default: c5a.large
    Description: EC2 instance type.

  InstanceCount:
    Type: Number
    Default: 1
    Description: Number of instances to launch.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing RSA KeyPair.

  RootVolumeSize:
    Type: Number
    Default: 15
    Description: Size of the Root volume (GB). For Windows set 100GB

  RootVolumeType:
    Type: String
    Default: gp3
    AllowedValues: [gp2, gp3, io1, io2]
    Description: Storage type for the Root volume.

  ZestyVolumeSize:
    Type: Number
    Default: 50
    Description: Size of the secondary Zesty-managed volume (GB).

  ZestyVolumeType:
    Type: String
    Default: gp3
    AllowedValues: [gp2, gp3, io1, io2]
    Description: Storage type for the Zesty-managed volume.

  EncryptVolumes:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable EBS encryption for both volumes.

  DeleteVolumesOnTermination:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Delete volumes when the instance is terminated.

Mappings:
  OSMap:
    AmazonLinux2023:
      Path: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
      OSType: "Linux"
    Windows2022:
      Path: "/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base"
      OSType: "Windows"

Conditions:
  IsCustom: !Equals [!Ref AmiSelection, "CustomAMI"]
  UseWindowsUserData: !Or
    - !Equals [!Ref AmiSelection, "Windows2022"]
    - !And [!Condition IsCustom, !Equals [!Ref CustomOSType, "Windows"]]

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ec2-tag-volumes
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [ec2:DescribeVolumes, ec2:CreateTags]
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  EC2LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "zesty-poc-template-${AWS::StackName}"
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        ImageId: !If
          - IsCustom
          - !Ref CustomAMI
          - !Sub
            - "{{resolve:ssm:${AmiPath}}}"
            - AmiPath: !FindInMap [OSMap, !Ref AmiSelection, Path]
        IamInstanceProfile: { Name: !Ref InstanceProfile }
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        SecurityGroupIds: [!Ref SecurityGroupId]
        TagSpecifications:
          - ResourceType: volume
            Tags:
              - {Key: ZestyDisk, Value: "true"}
              - {Key: Name, Value: ZestyPOC}
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSize
              VolumeType: !Ref RootVolumeType
              DeleteOnTermination: !Ref DeleteVolumesOnTermination
              Encrypted: !Ref EncryptVolumes
          - DeviceName: /dev/xvdb
            Ebs:
              VolumeSize: !Ref ZestyVolumeSize
              VolumeType: !Ref ZestyVolumeType
              DeleteOnTermination: !Ref DeleteVolumesOnTermination
              Encrypted: !Ref EncryptVolumes
        UserData:
          Fn::Base64: !If
            - UseWindowsUserData
            - !Sub |
                <Powershell>
                [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12;
                (New-Object System.Net.WebClient).DownloadFile("https://static.zesty.co/ZX-InfraStructure-Agent-release/windows/downloader.ps1", "$env:TEMP\downloader.ps1");
                powershell -File "$env:TEMP\downloader.ps1" -api_key ${ZestyApiKey}
                Start-Sleep -s 30
                if (Test-Path "C:\zesty\collector\zmount.exe") {
                    C:\zesty\collector\zmount.exe -driveLetter D -diskNumber 1
                }
                </Powershell>
            - !Sub |
                #!/bin/bash
                set -euxo pipefail
                dnf install -y awscli || yum install -y awscli
                curl -s https://static.zesty.co/ZX-InfraStructure-Agent-release/install.sh | sudo bash -s apikey=${ZestyApiKey}
                sleep 5
                zestyctl disk mount /dev/nvme1n1 /zd_directory || true
                curl "https://s3.eu-west-1.amazonaws.com/static.zesty.co/scripts/zesty-big-file-generator.sh" -o "/home/ec2-user/zesty-big-file-generator.sh"
                chmod +x /home/ec2-user/zesty-big-file-generator.sh

  EC2AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "zesty-asg-${AWS::StackName}"
      MinSize: !Ref InstanceCount
      MaxSize: !Ref InstanceCount
      DesiredCapacity: !Ref InstanceCount
      VPCZoneIdentifier: !Ref SubnetIds
      LaunchTemplate:
        LaunchTemplateId: !Ref EC2LaunchTemplate
        Version: !GetAtt EC2LaunchTemplate.LatestVersionNumber
      Tags:
        - {Key: Name, Value: Zesty-POC-Instance, PropagateAtLaunch: true}

Outputs:
  ASGName:
    Value: !Ref EC2AutoScalingGroup
