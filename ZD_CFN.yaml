AWSTemplateFormatVersion: '2010-09-09'
Description: Zesty-Disk-POC

Parameters:
  OSSelection:
    Type: String
    Default: AmazonLinux2023
    AllowedValues: [AmazonLinux2023, Windows2022]
    Description: Select the Operating System for the POC

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the instances

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for the instances

  ZestyApiKey:
    Type: String
    NoEcho: true
    Description: Your Zesty Infrastructure Agent API Key

  InstanceType:
    Type: String
    Default: c5a.large
    Description: EC2 instance type (c5a uses NVMe)

  InstanceCount:
    Type: Number
    Default: 1
    Description: Number of instances to launch

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair

Mappings:
  OSMap:
    AmazonLinux2023:
      AMI: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
    Windows2022:
      AMI: "/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base"

Conditions:
  IsWindows: !Equals [!Ref OSSelection, Windows2022]

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ec2-tag-volumes
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                  - ec2:CreateTags
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  EC2LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "zesty-poc-template-${AWS::StackName}"
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        ImageId: !Sub
          - "{{resolve:ssm:${AmiPath}}}"
          - AmiPath: !FindInMap [OSMap, !Ref OSSelection, AMI]
        IamInstanceProfile:
          Name: !Ref InstanceProfile
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        SecurityGroupIds:
          - !Ref SecurityGroupId
        TagSpecifications:
          - ResourceType: volume
            Tags:
              - Key: ZestyDisk
                Value: "true"
              - Key: Name
                Value: ZestyPOC
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 30
              VolumeType: gp3
              DeleteOnTermination: true
          - DeviceName: /dev/xvdb
            Ebs:
              VolumeSize: 50
              VolumeType: gp3
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !If
            - IsWindows
            - !Sub |
                <Powershell>
                [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12;
                (New-Object System.Net.WebClient).DownloadFile("https://static.zesty.co/ZX-InfraStructure-Agent-release/windows/downloader.ps1", "$env:TEMP\downloader.ps1");
                powershell -File "$env:TEMP\downloader.ps1" -api_key ${ZestyApiKey}
                Start-Sleep -s 30
                if (Test-Path "C:\zesty\collector\zmount.exe") {
                    C:\zesty\collector\zmount.exe -driveLetter D -diskNumber 1
                }
                </Powershell>
            - !Sub |
                #!/bin/bash
                set -euxo pipefail
                dnf install -y awscli

                # Install Zesty Agent
                curl -s https://static.zesty.co/ZX-InfraStructure-Agent-release/install.sh | sudo bash -s apikey=${ZestyApiKey}
                
                # Mount to /zd_directory
                sleep 5
                zestyctl disk mount /dev/nvme1n1 /zd_directory || true
              
                # Download data generator for POC testing
                curl "https://s3.eu-west-1.amazonaws.com/static.zesty.co/scripts/zesty-big-file-generator.sh" -o "/home/ec2-user/zesty-big-file-generator.sh"
                chmod +x /home/ec2-user/zesty-big-file-generator.sh

  EC2AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "zesty-asg-${AWS::StackName}"
      MinSize: !Ref InstanceCount
      MaxSize: !Ref InstanceCount
      DesiredCapacity: !Ref InstanceCount
      VPCZoneIdentifier: !Ref SubnetIds
      LaunchTemplate:
        LaunchTemplateId: !Ref EC2LaunchTemplate
        Version: !GetAtt EC2LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: Zesty-POC-Instance
          PropagateAtLaunch: true

Outputs:
  SelectedOS:
    Value: !Ref OSSelection
  ASGName:
    Value: !Ref EC2AutoScalingGroup
